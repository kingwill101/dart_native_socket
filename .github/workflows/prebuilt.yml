name: Prebuilt

on:
  push:
    branches:
      - main
    tags:
      - 'native_socket-v*'
  pull_request:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to stamp into the generated manifest
        required: false
        type: string

permissions:
  contents: read

env:
  PUB_CACHE: ${{ github.workspace }}/.pub-cache
  CONFIG: native_prebuilt.yaml
  MANIFEST_OUTPUT: lib/src/hook/native_socket_prebuilts.g.dart

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - name: Install native toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            clang \
            cmake \
            libclang-dev \
            ninja-build \
            pkg-config
      - run: dart pub get
      - run: dart test
      - name: Stage built library
        run: |
          mkdir -p built-library
          cp -R .dart_tool/lib/. built-library/
      - uses: actions/upload-artifact@v4
        with:
          name: linux-built-library
          path: built-library/
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart test
      - name: Stage built library
        run: |
          New-Item -ItemType Directory -Force -Path built-library | Out-Null
          Copy-Item -Recurse -Force ".dart_tool/lib/*" built-library
      - uses: actions/upload-artifact@v4
        with:
          name: windows-built-library
          path: built-library/
          if-no-files-found: error

  build-macos:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - run: dart pub get
      - run: dart test
      - name: Stage built library
        run: |
          mkdir -p built-library
          cp -R .dart_tool/lib/. built-library/
      - uses: actions/upload-artifact@v4
        with:
          name: macos-built-library
          path: built-library/
          if-no-files-found: error

  update-manifest:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    needs:
      - build-linux
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dart-lang/setup-dart@v1
      - uses: actions/download-artifact@v4
        with:
          name: linux-built-library
          path: downloaded/linux/
      - uses: actions/download-artifact@v4
        with:
          name: windows-built-library
          path: downloaded/windows/
      - uses: actions/download-artifact@v4
        with:
          name: macos-built-library
          path: downloaded/macos/
      - name: Merge built libraries
        run: |
          rm -rf built-library release-assets
          mkdir -p built-library release-assets
          cp -R downloaded/linux/. built-library/
          cp -R downloaded/windows/. built-library/
          cp -R downloaded/macos/. built-library/
      - run: dart pub get
      - name: Generate manifest and release assets
        run: |
          TAG="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}"
          dart run native_prebuilt manifest update \
            --config "$CONFIG" \
            --output "$MANIFEST_OUTPUT" \
            --built-library-dir built-library \
            --release-assets-dir release-assets \
            --tag "$TAG"
      - uses: actions/upload-artifact@v4
        with:
          name: generated-manifest
          path: ${{ env.MANIFEST_OUTPUT }}
      - uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: release-assets/
          if-no-files-found: error

  release:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    needs:
      - update-manifest
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets/
      - uses: actions/download-artifact@v4
        with:
          name: generated-manifest
          path: generated-manifest/
      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
          fail_on_unmatched_files: true
          files: |
            release-assets/*
            generated-manifest/*
